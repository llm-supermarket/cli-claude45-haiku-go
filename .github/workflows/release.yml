name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            name: linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            name: linux-arm64
          - os: ubuntu-latest
            goos: linux
            goarch: arm
            goarm: '7'
            name: linux-armv7
          - os: macos-latest
            goos: darwin
            goarch: amd64
            name: macos-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            name: macos-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            name: windows-amd64
          - os: windows-latest
            goos: windows
            goarch: arm64
            name: windows-arm64

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23'

    - name: Download dependencies
      run: go mod download

    - name: Build
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        GOARM: ${{ matrix.goarm }}
      run: |
        if [ "$GOOS" = "windows" ]; then
          go build -o cli-encrypt-${{ matrix.name }}.exe -ldflags="-X main.version=${{ github.ref_name }}"
        else
          go build -o cli-encrypt-${{ matrix.name }} -ldflags="-X main.version=${{ github.ref_name }}"
        fi
      shell: bash

    - name: Generate checksums
      run: |
        if [ "${{ matrix.goos }}" = "windows" ]; then
          sha256sum cli-encrypt-${{ matrix.name }}.exe > cli-encrypt-${{ matrix.name }}.exe.sha256
        else
          sha256sum cli-encrypt-${{ matrix.name }} > cli-encrypt-${{ matrix.name }}.sha256
        fi
      shell: bash

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: binaries-${{ matrix.name }}
        path: |
          cli-encrypt-${{ matrix.name }}*
        retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v3
      with:
        path: artifacts

    - name: Flatten artifacts
      run: |
        mkdir -p release
        find artifacts -type f -exec mv {} release/ \;

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: release/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
